# ASSET_INTELLIGENCE.yaml
#
# Source-of-truth metadata for every asset that can land on the timeline.
# Built from docs/ASSET_INDEX.md, the per-clip *.txt visual descriptors in
# footage/<bin>/, and the contact sheets in footage/91_Visual_Contact_Sheets/.
#
# Field contract (per Implementation Plan.md step 5 + checklist item 1):
#   asset_id        Stable id; matches the SQLite assets.id where one exists.
#   file            Repo-relative path to the underlying media file.
#   trip_order      Integer chronological rank (matches the NNN_ filename
#                   prefix for source footage; synthetic for derived assets
#                   like VO chunks, music beds, and title cards).
#   story_phase     One of:
#                     intro, trip_setup, drive_to_titusville, factory_visit,
#                     technical_keyboard_stills, post_pickup_argument,
#                     car_trouble_return, home_demo_payoff, pickup_to_record
#                   For derived assets (VO/music/title cards) this is the
#                   primary phase the asset is intended to score/cover.
#   clip_type       One of:
#                     talking_head, driving_broll, gas_station, food_stop,
#                     factory_broll, keyboard_demo, keyboard_still,
#                     lake_broll, car_trouble, home_demo, title_card,
#                     placeholder, music, voiceover
#   has_dialogue    True if the asset contains spoken words (Lionel or others).
#   has_motion      True if the asset has visible camera or subject motion.
#                   False for stills, title cards, audio-only assets.
#   visual_summary  One-line description of what the viewer sees.
#   best_ranges     [{in: <sec>, out: <sec>, reason: ...}]
#                   Recommended cut windows for this asset. For very short
#                   stills/title cards, leave empty (any range is the asset).
#   avoid_ranges    [{in: <sec>, out: <sec>, reason: ...}]
#                   Windows to skip (blurry, off-topic, framing breaks).
#                   Empty list when nothing to avoid.

